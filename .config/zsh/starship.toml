palette = "noctalia"
add_newline = false
scan_timeout = 300
command_timeout = 1000

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$python\
$character
"""

# ─────────────────────────
# USER / HOST
# ─────────────────────────

[username]
show_always = false
style_user = "fg:242"
style_root = "white"
format = "[$user]($style)"

[hostname]
ssh_only = true
style = "fg:242"
format = "[@$hostname]($style) "

# ─────────────────────────
# DIRECTORY
# ─────────────────────────

[directory]
style = "fg:#57C7FF"
truncation_length = 3
truncate_to_repo = false

# ─────────────────────────
# GIT
# ─────────────────────────

[git_branch]
symbol = ""
style = "fg:242"
format = "[$branch]($style)"

[git_status]
style = "fg:242"

ahead = ":⇡"
behind = ":⇣"
diverged = ":⇕"
up_to_date = ""
untracked = "*"
stashed = ""
modified = "*"
staged = "*"
renamed = ""
deleted = ""

format = "[$all_status$ahead_behind]($style)"

# ─────────────────────────
# COMMAND DURATION
# ─────────────────────────

[cmd_duration]
min_time = 5000
style = "fg:#F3F99D"
format = "[$duration]($style) "

show_milliseconds = false

# ─────────────────────────
# PYTHON VENV
# ─────────────────────────

[python]
style = "fg:242"
format = '[${virtualenv}]($style) '
python_binary = "python"

# ─────────────────────────
# PROMPT CHARACTER
# ─────────────────────────

[character]
success_symbol = "[❯](bold #FF6AC1)"
error_symbol = "[❯](bold #FF5C57)"
vimcmd_symbol = "[❮](bold #FF6AC1)"
vimcmd_replace_one_symbol = "[❮](bold #FF5C57)"
vimcmd_replace_symbol = "[❮](bold #FF5C57)"
vimcmd_visual_symbol = "[❮](bold #FF6AC1)"




