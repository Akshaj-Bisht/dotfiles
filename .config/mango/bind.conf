# ─── Reload ───
bind=SUPER,r,reload_config

# ─── Apps (Niri-style) ───
bind=SUPER,Return,spawn,foot
bind=SUPER,b,spawn,xdg-open https://
bind=SUPER,e,spawn,thunar
bind=SUPER,g,spawn,emacsclient -c -n -a ""
# ─── Noctalia (Niri-style) ───
bind=SUPER,space,spawn,noctalia msg panel-toggle launcher
bind=SUPER,s,spawn,noctalia msg panel-toggle control-center
bind=SUPER,v,spawn,noctalia msg panel-toggle clipboard
bind=SUPER,Escape,spawn,noctalia msg panel-toggle session
bind=SUPER+ALT,l,spawn,noctalia msg session lock
bind=SUPER+CTRL,comma,spawn,noctalia msg settings-toggle
bind=SUPER+SHIFT,t,spawn,noctalia msg theme-mode-toggle
bind=SUPER+SHIFT,n,spawn,noctalia msg notification-dnd-toggle

# ─── Window ───
bind=SUPER,q,killclient,
bind=SUPER,m,quit
bind=SUPER,f,togglemaximizescreen,
bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER,t,togglefloating,
bind=SUPER,o,toggleoverview,0

# ─── Focus ───
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down
bind=SUPER,Tab,focuslast
bind=SUPER,u,focuslast
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down

# ─── Resize ───
bind=CTRL+SUPER,Up,resizewin,+0,-50
bind=CTRL+SUPER,Down,resizewin,+0,+50
bind=SUPER+CTRL,h,resizewin,-50,+0
bind=SUPER+CTRL,l,resizewin,+50,+0
bind=SUPER+CTRL,k,resizewin,+0,-50
bind=SUPER+CTRL,j,resizewin,+0,+50

# ─── Tags ───
bind=Super,1,view,1,0
bind=Super,2,view,2,0
bind=Super,3,view,3,0
bind=Super,4,view,4,0
bind=Super,5,view,5,0
bind=Super,6,view,6,0
bind=Super,7,view,7,0
bind=Super,8,view,8,0
bind=Super,9,view,9,0
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# ─── Layouts ───
bind=SUPER,n,spawn,bash ~/.config/mango/scripts/switch_layout.sh
bind=CTRL+SUPER,i,setlayout,tile
bind=CTRL+SUPER,o,setlayout,scroller
bind=CTRL+SUPER,d,setlayout,dwindle
bind=CTRL+SUPER,g,setlayout,grid
bind=CTRL+SUPER,m,setlayout,monocle

# ─── Scratchpad ───
bind=SUPER,grave,spawn,bash ~/.config/mango/scripts/scratchpad.sh

# ─── Screenshots ───
bind=SHIFT,Print,spawn,bash ~/.config/mango/scripts/screenshot.sh full
bind=CTRL,Print,spawn,bash ~/.config/mango/scripts/screenshot.sh screen
bind=ALT,Print,spawn,bash ~/.config/mango/scripts/screenshot.sh window
bind=SUPER,Print,spawn,bash ~/.config/mango/scripts/screenshot.sh edit
bind=CTRL+ALT,a,spawn_shell,grim -g "$(slurp -b '#2E2A1E55' -c '#fb751bff')" -t ppm - | satty -f -

# ─── Audio, Brightness & Media ───
bind=none,XF86AudioRaiseVolume,spawn,noctalia msg volume-up
bind=none,XF86AudioLowerVolume,spawn,noctalia msg volume-down
bind=none,XF86AudioMute,spawn,noctalia msg volume-mute
bind=none,XF86MonBrightnessUp,spawn,noctalia msg brightness-up
bind=none,XF86MonBrightnessDown,spawn,noctalia msg brightness-down
bind=none,XF86AudioPlay,spawn,noctalia msg media toggle
bind=none,XF86AudioNext,spawn,noctalia msg media next
bind=none,XF86AudioPrev,spawn,noctalia msg media previous
bind=none,XF86AudioStop,spawn,noctalia msg media stop

# ─── Mouse ───
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
